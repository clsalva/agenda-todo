<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Todo Admin</title>
  <style>
    :root{--bg:#eef2f8;--card:#fff;--text:#171b25;--muted:#667085;--primary:#0a84ff;--border:rgba(27,33,47,.1);--shadow:0 18px 50px rgba(12,18,31,.12);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,rgba(10,132,255,.16),transparent 28%),var(--bg);display:grid;place-items:center;padding:24px;color:var(--text)}.card{width:min(520px,100%);background:rgba(255,255,255,.88);border:1px solid var(--border);border-radius:28px;padding:28px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--primary)}h1{margin:6px 0 8px;font-size:28px;letter-spacing:-.03em}.small{color:var(--muted);line-height:1.45}label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;color:var(--muted);margin:18px 0 6px}input{width:100%;border:1px solid var(--border);border-radius:16px;padding:14px;font-size:16px;background:#f7f9fc}button{width:100%;margin-top:20px;border:0;border-radius:18px;background:var(--primary);color:#fff;font-weight:800;font-size:16px;padding:15px;cursor:pointer}.result{margin-top:18px;padding:14px;border-radius:16px;background:#f7f9fc;word-break:break-word;display:none}.ok{border:1px solid rgba(48,209,88,.35)}.ko{border:1px solid rgba(255,69,58,.35)}a{color:var(--primary);font-weight:700}</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Agenda Todo Admin</div>
    <h1>Invita nuovo utente</h1>
    <p class="small">Crea un'agenda personale con token dedicato e invia automaticamente il link configurato.</p>

    <label for="name">Nome utente</label>
    <input id="name" placeholder="Es. Mario" autocomplete="name" />

    <label for="email">Email utente</label>
    <input id="email" type="email" placeholder="mario@example.com" autocomplete="email" />

    <label for="secret">Admin secret</label>
    <input id="secret" type="password" placeholder="ADMIN_SECRET Render" />

    <button id="sendBtn">Crea e invia invito</button>
    <div id="result" class="result"></div>
  </main>

<script>
const BACKEND_URL = 'https://agenda-push-backend.onrender.com';
const result = document.getElementById('result');
function show(msg, ok=true){ result.style.display='block'; result.className='result ' + (ok?'ok':'ko'); result.innerHTML=msg; }

document.getElementById('sendBtn').addEventListener('click', async ()=>{
  const label = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const secret = document.getElementById('secret').value.trim();
  if(!label || !email || !secret) return show('Compila nome, email e admin secret.', false);

  try{
    show('Invio in corso...');
    const res = await fetch(`${BACKEND_URL}/api/admin/invite`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-admin-secret': secret },
      body: JSON.stringify({ label, email })
    });
    const json = await res.json();
    if(!res.ok || !json.ok) throw new Error(json.error || 'Errore invito');
    show(`Invito creato e inviato.<br><br><a href="${json.inviteUrl}" target="_blank">Apri link invito</a><br><br><small>${json.inviteUrl}</small>`);
  }catch(err){ show('Errore: ' + err.message, false); }
});
</script>
</body>
</html>
